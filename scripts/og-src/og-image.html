<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG Image — At Least Play Baseball</title>
<meta name="viewport" content="width=1200">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .og {
    width: 1200px; height: 630px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
    font-family: var(--serif);
    color: var(--ink);
  }
  /* Paper hairlines */
  .og::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(transparent 0, transparent 47px, rgba(28,29,31,0.035) 47px, rgba(28,29,31,0.035) 48px);
    background-size: 100% 48px;
    pointer-events: none;
  }
  .inner {
    position: absolute; inset: 0;
    padding: 72px 80px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }
  .eyebrow {
    font-family: var(--sans); font-size: 16px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--ink-60);
    padding-top: 12px;
    border-top: 2px solid var(--rideau);
    display: inline-block;
    align-self: flex-start;
  }
  .headline {
    font-family: 'Instrument Serif', 'Source Serif 4', Georgia, serif;
    font-weight: 400;
    font-size: 132px;
    line-height: 0.96;
    letter-spacing: -0.015em;
    color: var(--ink);
    max-width: 1040px;
    margin: 0;
  }
  .headline em { font-style: italic; font-weight: 400; }

  .domain {
    font-family: var(--mono); font-size: 18px;
    color: var(--ink-70); letter-spacing: 0.02em;
  }

  /* Motif canvas — diamond + pitch overlay */
  .motif-bg {
    position: absolute;
    top: 50%; right: -120px;
    transform: translateY(-50%);
    width: 720px; height: 720px;
    opacity: 0.14;
    z-index: 1;
    pointer-events: none;
  }
  .motif-bg canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div class="og" id="og">
  <div class="motif-bg"><canvas id="motif" width="1440" height="1440"></canvas></div>
  <div class="inner">
    <div class="eyebrow">A public record · Ottawa · 2026</div>

    <h1 class="headline">A park, a pitch, and <em>two very different records.</em></h1>

    <div class="domain">atleastplaybaseball.com</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('motif');
  const ctx = canvas.getContext('2d');
  const W = 1440, H = 1440;
  const cx = W / 2, cy = H / 2;

  const N = 200;
  const dHalf = 520;
  const diamond = [];
  for (let i = 0; i < N; i++) {
    const t = i / N;
    const seg = Math.floor(t * 4);
    const localT = (t * 4) - seg;
    const corners = [
      [cx, cy + dHalf], [cx + dHalf, cy], [cx, cy - dHalf], [cx - dHalf, cy], [cx, cy + dHalf],
    ];
    const a = corners[seg], b = corners[seg + 1];
    diamond.push([a[0] + (b[0] - a[0]) * localT, a[1] + (b[1] - a[1]) * localT]);
  }

  const rx = 620, ry = 440;
  const oval = [];
  for (let i = 0; i < N; i++) {
    const theta = (i / N) * Math.PI * 2 - Math.PI / 2;
    oval.push([cx + Math.cos(theta) * rx, cy + Math.sin(theta) * ry]);
  }

  ctx.strokeStyle = '#1C1D1F';
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  ctx.beginPath();
  diamond.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
  ctx.closePath();
  ctx.stroke();

  ctx.beginPath();
  oval.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
  ctx.closePath();
  ctx.stroke();
})();
</script>
</body>
</html>
